                    <p>惠子謂莊子曰：「吾有大樹，人謂之樗；其大本擁腫而不中繩墨，其小枝卷曲而不中規矩。立之塗，匠者不顧。今子之言，大而無用，眾所同去也。」莊子曰：「子獨不見狸狌乎？卑身而伏，以候敖者；東西跳梁，不辟高下，中於機辟，死於罔罟。今夫斄牛，其大若垂天之雲；此能為大矣，而不能執鼠。今子有大樹，患其無用，何不樹之於無何有之鄉，廣莫之野，彷徨乎無為其側，逍遙乎寢卧其下；不夭斤斧，物無害者。無所可用，安所困苦哉？」</p>

                content: `
                    <p>廉頗者，趙之良將也。趙惠文王十六年，廉頗為趙將，伐齊，大破之，取陽晉，拜為上卿，以勇氣聞於諸侯。藺相如者，趙人也。為趙宦者令繆賢舍人。</p>
                    <p>趙惠文王時，得楚和氏璧。秦昭王聞之，使人遺趙王書，願以十五城請易璧。趙王與大將軍廉頗諸大臣謀：欲予秦，秦城恐不可得，徒見欺；欲勿予，即患秦兵之來。計未定，求人可使報秦者，未得。宦者令繆賢曰：「臣舍人藺相如可使。」王問：「何以知之？」對曰：「臣嘗有罪，竊計欲亡走燕。臣舍人相如止臣曰：『君何以知燕王？』臣語曰：『臣嘗從大王與燕王會境上，燕王私握臣手曰，「願結友」，以此知之，故欲往。』相如謂臣曰：『夫趙強而燕弱，而君幸於趙王，故燕王欲結於君。今君乃亡走燕，燕畏趙，其勢必不敢留君，而交將之趙。君不如肉袒伏斧質請罪，則幸得脫矣。』臣從其計，大王亦幸赦臣。臣竊以為其人勇士，有智謀，宜可使。」於是王召見，問藺相如曰：「秦王以十五城請易寡人之璧，可予不？」相如曰：「秦彊而趙弱，不可不許。」王曰：「取吾璧，不予我城，奈何？」相如曰：「秦以城求璧而趙不許，曲在趙；趙予璧而秦不予趙城，曲在秦。均之二策，寧許以負秦曲。」王曰：「誰可使者？」相如曰：「王必無人，臣願奉璧往使。城入趙而璧留秦；城不入，臣請完璧歸趙。」趙王於是遂遣相如奉璧西入秦。</p>
                    <p>秦王坐章臺見相如，相如奉璧奏秦王。秦王大喜，傳以示美人及左右，左右皆呼萬歲。相如視秦王無意償趙城，乃前曰：「璧有瑕，請指示王。」秦王授璧，相如因持璧卻立，倚柱，怒髮上衝冠，謂秦王曰：「大王欲得璧，使人發書至趙王，趙王悉召羣臣議，皆曰：『秦貪，負其彊，以空言求璧，償城恐不可得。』議不欲予秦璧。臣以為布衣之交尚不相欺，況大國乎？且以一璧之故逆彊秦之驩，不可。於是趙王乃齋戒五日，使臣奉璧，拜送書於庭。何者？嚴大國之威以修敬也。今臣至，大王見臣列觀，禮節甚倨；得璧，傳之美人，以戲弄臣。臣觀大王無意償趙王城邑，故臣復取璧。大王必欲急臣，臣頭今與璧俱碎於柱矣！」相如持其璧睨柱，欲以擊柱。秦王恐其破璧，乃辭謝，固請，召有司案圖，指從此以往十五都予趙。相如度秦王特以詐佯為予趙城，實不可信，乃謂秦王曰：「和氏璧，天下所共傳寶也，趙王恐，不敢不獻。趙王送璧時，齋戒五日。今大王亦宜齋戒五日，設九賓於廷，臣乃敢上璧。」秦王度之，終不可強奪，遂許齋五日。舍相如廣成傳。相如度秦王雖齋，決負約不償城，乃使其從者衣褐，懷其璧，從徑道亡，間至趙矣。</p>
                    <p>秦王齋五日後，乃設九賓禮於廷，引趙使者藺相如。相如至，謂秦王曰：「秦自繆公以來二十餘君，未嘗有堅明約束者也。臣誠恐見欺於王而負趙，故令人持璧歸，間至趙矣。且秦彊而趙弱，大王遣一介之使至趙，趙立奉璧來；今以秦之彊而先割十五都予趙，趙豈敢留璧而得罪於大王乎？臣知欺大王之罪當誅，臣請就湯鑊。唯大王與羣臣孰計議之！」秦王與羣臣相視而嘻。左右或欲引相如去，秦王因曰：「今殺相如，終不能得璧也，而絕秦趙之驩，不如因而厚遇之，使歸趙，趙王豈以一璧之故欺秦邪！」卒廷見相如，畢禮而歸之。相如既歸，趙王以為賢大夫，使不辱於諸侯，拜相如為上大夫。秦亦不以城予趙，趙亦終不予秦璧。
                    <p>其後秦伐趙，拔石城。明年，復攻趙，殺二萬人。秦王使使者告趙王，欲與王為好會於西河外澠池。趙王畏秦，欲毋行。廉頗、藺相如計曰：「王不行，示趙弱且怯也。」趙王遂行，相如從。廉頗送至境，與王訣曰：「王行，度道里會遇之禮畢，還，不過三十日。三十日不還，則請立太子為王，以絕秦望。」王許之，遂與秦王會澠池。秦王飲酒酣，曰：「寡人竊聞趙王好音，請奏瑟。」趙王鼓瑟。秦御史前書曰：「某年月日，秦王與趙王會飲，令趙王鼓瑟。」藺相如前曰：「趙王竊聞秦王善為秦聲，請奏盆缻秦王，以相娛樂。」秦王怒，不許。於是相如前進缻，因跪請秦王。秦王不肯擊缻。相如曰：「五步之內，相如請得以頸血濺大王矣！」左右欲刃相如，相如張目叱之，左右皆靡。於是秦王不懌，為一擊缻。相如顧召趙御史書曰：「某年月日，秦王為趙王擊缻。」秦之羣臣曰：「請以趙十五城為秦王壽。」藺相如亦曰：「請以秦之咸陽為趙王壽。」秦王竟酒，終不能加勝於趙。趙亦盛設兵以待秦，秦不敢動。</p>
                    <p>既罷歸國，以相如功大，拜為上卿，位在廉頗之右。廉頗曰：「我為趙將，有攻城野戰之大功，而藺相如徒以口舌為勞，而位居我上，且相如素賤人，吾羞，不忍為之下。」宣言曰：「我見相如，必辱之。」相如聞，不肯與會。相如每朝時，常稱病，不欲與廉頗爭列。已而相如出，望見廉頗，相如引車避匿。於是舍人相與諫曰：「臣所以去親戚而事君者，徒慕君之高義也。今君與廉頗同列，廉君宣惡言而君畏匿之，恐懼殊甚，且庸人尚羞之，況於將相乎！臣等不肖，請辭去。」藺相如固止之，曰：「公之視廉將軍孰與秦王？」曰：「不若也。」相如曰：「夫以秦王之威，而相如廷叱之，辱其羣臣，相如雖駑，獨畏廉將軍哉？顧吾念之，彊秦之所以不敢加兵於趙者，徒以吾兩人在也。今兩虎共鬥，其勢不俱生。吾所以為此者，以先國家之急而後私讎也。」廉頗聞之，肉袒負荊，因賓客至藺相如門謝罪。曰：「鄙賤之人，不知將軍寬之至此也。」卒相與驩，為刎頸之交。</p>

                    <p>臣亮言：先帝創業未半，而中道崩殂；今天下三分，益州疲弊，此誠危急存亡之秋也。然侍衛之臣，不懈於內；忠志之士，忘身於外者：蓋追先帝之殊遇，欲報之於陛下也。誠宜開張聖聽，以光先帝遺德，恢弘志士之氣；不宜妄自菲薄，引喻失義，以塞忠諫之路也。</p>
                    <p>宮中府中，俱為一體；陟罰臧否，不宜異同。若有作姦犯科，及為忠善者，宜付有司，論其刑賞，以昭陛下平明之理；不宜偏私，使內外異法也。</p>
                    <p>侍中、侍郎郭攸之、費禕、董允等，此皆良實，志慮忠純，是以先帝簡拔以遺陛下。愚以為宮中之事，事無大小，悉以咨之，然後施行，必能裨補闕漏，有所廣益。將軍向寵，性行淑均，曉暢軍事，試用於昔日，先帝稱之曰「能」，是以眾議舉寵為督。愚以為營中之事，悉以咨之，必能使行陣和睦，優劣得所。</p>
                    <p>親賢臣，遠小人，此先漢所以興隆也；親小人，遠賢臣，此後漢所以傾頹也。先帝在時，每與臣論此事，未嘗不歎息痛恨於桓、靈也！侍中、尚書、長史、參軍，此悉貞良死節之臣，願陛下親之、信之，則漢室之隆，可計日而待也。</p>
                    <p>臣本布衣，躬耕於南陽，苟全性命於亂世，不求聞達於諸侯。先帝不以臣卑鄙，猥自枉屈，三顧臣於草廬之中，諮臣以當世之事，由是感激，遂許先帝以驅馳。後值傾覆，受任於敗軍之際，奉命於危難之間，爾來二十有一年矣。先帝知臣謹慎，故臨崩寄臣以大事也。受命以來，夙夜憂歎，恐託付不效，以傷先帝之明；故五月渡瀘，深入不毛。今南方已定，兵甲已足，當獎率三軍，北定中原，庶竭駑鈍，攘除姦凶，興復漢室，還於舊都。此臣所以報先帝而忠陛下之職分也。至於斟酌損益，進盡忠言，則攸之、禕、允之任也。</p>

                    <p>嗟乎！師道之不傳也久矣！欲人之無惑也難矣！古之聖人，其出人也遠矣，猶且從師而問焉；今之眾人，其下聖人也亦遠矣，而恥學於師。是故聖益聖，愚益愚，聖人之所以為聖，愚人之所以為愚，其皆出於此乎？</p>

                    <p>今年九月二十八日，因坐法華西亭，望西山，始指異之。遂命僕人，過湘江，緣染溪，斫榛莽，焚茅茷，窮山之高而止。攀援而登，箕踞而遨，則凡數州之土壤，皆在衽席之下。</p>

                `

                    <p>慶曆四年春，滕子京謫守巴陵郡。越明年，政通人和，百廢具興，乃重修岳陽樓，增其舊制，刻唐賢今人詩賦於其上，屬予作文以記之。</p>
                    <p>予觀夫巴陵勝狀，在洞庭一湖。銜遠山，吞長江，浩浩湯湯，橫無際涯；朝暉夕陰，氣象萬千；此則岳陽樓之大觀也，前人之述備矣。然則北通巫峽，南極瀟湘，遷客騷人，多會於此，覽物之情，得無異乎？</p>

                    <p>嗟夫！予嘗求古仁人之心，或異二者之為，何哉？不以物喜，不以己悲，居廟堂之高，則憂其民；處江湖之遠，則憂其君。是進亦憂，退亦憂；然則何時而樂耶？其必曰：「先天下之憂而憂，後天下之樂而樂」乎！噫！微斯人，吾誰與歸？</p>

                content: `
                    <p>六國破滅，非兵不利，戰不善，弊在賂秦。賂秦而力虧，破滅之道也。或曰：六國互喪，率賂秦耶？曰：不賂者以賂者喪，蓋失強援，不能獨完。故曰：弊在賂秦也。</p>
                    <p>秦以攻取之外，小則獲邑，大則得城。較秦之所得，與戰勝而得者，其實百倍；諸侯之所亡，與戰敗而亡者，其實亦百倍。則秦之所大欲，諸侯之所大患，固不在戰矣。思厥先祖父，暴霜露，斬荊棘，以有尺寸之地。子孫視之不甚惜，舉以予人，如棄草芥。今日割五城，明日割十城，然後得一夕安寢。起視四境，而秦兵又至矣。然則諸侯之地有限，暴秦之欲無厭，奉之彌繁，侵之愈急。故不戰而強弱勝負已判矣。至於顛覆，理固宜然。古人云：「以地事秦，猶抱薪救火，薪不盡，火不滅。」此言得之。</p>
                    <p>齊人未嘗賂秦，終繼五國遷滅，何哉？與嬴而不助五國也。五國既喪，齊亦不免矣。燕趙之君，始有遠略，能守其土，義不賂秦。是故燕雖小國而後亡，斯用兵之效也。至丹以荊卿為計，始速禍焉。趙嘗五戰於秦，二敗而三勝。後秦擊趙者再，李牧連卻之。洎牧以讒誅，邯鄲為郡，惜其用武而不終也。且燕趙處秦革滅殆盡之際，可謂智力孤危，戰敗而亡，誠不得已。向使三國各愛其地，齊人勿附於秦，刺客不行，良將猶在，則勝負之數，存亡之理，當與秦相較，或未易量。</p>
                    <p>嗚呼！以賂秦之地，封天下之謀臣，以事秦之心，禮天下之奇才，併力西嚮，則吾恐秦人食之不得下嚥也。悲夫！有如此之勢，而為秦人積威之所劫，日削月割，以趨於亡。為國者無使為積威之所劫哉！</p>
                    <p>夫六國與秦皆諸侯，其勢弱於秦，而猶有可以不賂而勝之之勢。苟以天下之大，而從六國破亡之故事，是又在六國下矣。</p>

                            <p>可憐後主還祠廟，日暮聊為梁甫吟。</p>
                        </div>
                    </div>

                    <div class="mb-12">
                        <p class="font-bold text-2xl mb-2 text-center text-blue-700">【山居秋暝】(王維)</p>
                        <div class="bg-blue-50/50 p-4 rounded-xl mb-4 text-sm text-gray-700">
                            <strong>背景簡介：</strong>這首詩是王維居於輞川時所寫，「山居」就是他所住的輞川別墅，王維晚年在此處過着半官半隱的生活。詩中描寫了秋天傍晚時候山村的秀美景色，亦描繪出詩人居於山中的恬淡生活。
                        </div>
                        <div class="poetry-format">
                            <p>空山新雨後，天氣晚來秋。</p>
                            <p>明月松間照，清泉石上流。</p>
                            <p>竹喧歸浣女，蓮動下漁舟。</p>
                            <p>隨意春芳歇，王孫自可留。</p>
                        </div>
                    </div>
                    
                    <div class="mb-12">
                        <p class="font-bold text-2xl mb-2 text-center text-blue-700">【月下獨酌】(李白)</p>
                        <div class="bg-blue-50/50 p-4 rounded-xl mb-4 text-sm text-gray-700">
                            <strong>背景簡介：</strong>據張健《李白詩選：大唐詩仙》一書考證，《月下獨酌》是李白在天寶三載（公元744）春天所作，共有四首。李白於長安任翰林供奉，因受權貴排擠而漸為玄宗疏遠，李白心情抑鬱，於是寄情於狂歌痛飲，藉以排解胸中鬱悶。李白就是在這樣的背景下寫成這組詩。
                        </div>
                        <div class="poetry-format">
                            <p>花間一壺酒，獨酌無相親。</p>
                            <p>舉杯邀明月，對影成三人。</p>
                            <p>月既不解飲，影徒隨我身。</p>
                            <p>暫伴月將影，行樂須及春。</p>
                            <p>我歌月徘徊，我舞影零亂。</p>
                            <p>醒時同交歡，醉後各分散。</p>
                            <p>永結無情遊，相期邈雲漢。</p>
                        </div>
                    </div>
                `
            },
            {
                id: 'ciqu',
                title: '宋詞、元曲三首',
                shortTitle: '詞曲三首 (宋詞/元曲)',
                author: '蘇軾 / 李清照 / 辛棄疾',
                category: '詩詞曲',
                intro: '本單元收錄了宋代詞人和元代散曲家的代表作品，展現了詞曲這種文學體裁在抒情達意方面的獨特魅力。',
                type: 'poetry',
                annotations: [
                    {term: '故壘', def: '舊的營壘。'},
                    {term: '周郎', def: '周瑜，字公瑾，三國時吳國的大都督。'},
                    {term: '小喬', def: '三國時喬玄的幼女。喬玄有兩個女兒，皆國色天香。大喬嫁給孫策，小喬則嫁給周瑜。《三國志‧吳書‧周瑜傳》：「時喬公兩女，皆國色也。策自納大喬，瑜納小喬。」'},
                    {term: '羽扇綸巾', def: '羽扇：用羽毛製成的扇。綸巾：用絲帶製成的頭巾。綸：○ 粵 [關]，[gwaan1]；○ 普 [ɡuɑ ̄ n]。'},
                    {term: '檣櫓', def: '此處借代戰船。○ 粵 [場老]，[coeng4lou5]；○ 普 [qiɑ́ nɡlǔ]。檣：船的桅杆。櫓：船槳。'},
                    {term: '故國', def: '當日的赤壁戰場。'},
                    {term: '華髮', def: '半白的頭髮。華：通「花」。'},
                    {term: '尊', def: '通「樽」，借指酒。'},
                    {term: '酹', def: '把酒灑在地上表示祭奠。○ 粵 [賴]，[laai6]；○ 普 [lèi]。'},
                    {term: '乍煖還寒', def: '剛剛還很暖和，很快又變冷，指深秋天氣變化無常。煖：同「暖」。'},
                    {term: '將息', def: '調養、休息。'},
                    {term: '晚來風急', def: '一作「曉來風急」，也作「晚來風力」。'},
                    {term: '憔悴損', def: '指黃花凋謝枯萎。'},
                    {term: '次第', def: '光景、情形。'},
                    {term: '了得', def: '概括得了。'},
                    {term: '青玉案', def: '本指青玉所製的用來放置食物的短足托盤。這裏用作詞牌。○ 粵 [按]，[on3]；○ 普 [ɑ̀ n]。另一解謂「案」即「桉」，與「碗」的古字「椀」相通。○ 粵 [碗]，[wun2]； ○ 普 [wɑ ̌ n]。'},
                    {term: '元夕', def: '舊稱農曆正月十五日為上元節，是夜稱元夕、元夜或元宵。'},
                    {term: '東風', def: '指春風。'},
                    {term: '花千樹', def: '花燈多如千樹開花。'},
                    {term: '星如雨', def: '指煙花如雨般落下。星：指煙花。一說指燈。'},
                    {term: '寶馬雕車', def: '寶馬：名貴的駿馬。雕車：飾有雕花、彩繪的車；裝飾華麗的車。'},
                    {term: '香', def: '指車中人的衣鬢之香。'},
                    {term: '鳳簫聲動', def: '樂聲四處繚繞。鳳簫：即排簫，比竹為之，參差如鳳翼，故名。一說是簫的美稱。'},
                    {term: '玉壺', def: '喻明月。一說指白玉造的燈，一說指漏壺，即古代計時器。'},
                    {term: '光轉', def: '月光照射的位置轉變，意指時間推移。○ 粵 [囀]，[zyun2]；○ 普 [zhuɑ ̌ n]。'},
                    {term: '魚龍舞', def: '指舞動魚形、龍形的彩燈。'},
                    {term: '蛾兒雪柳黃金縷', def: '描寫路上的女子穿戴着各種頭飾。蛾兒：古代婦女於元宵節前後插戴在頭上，用烏金紙剪裁成蝶或蛾狀的飾物。雪柳：宋代婦女在立春日和元宵節時插戴的一種絹或紙製成的頭花。黃金縷：古代婦女戴在頭上的金色頭飾。縷：泛指線狀物。○ 粵 [侶]，[leoi5]；○ 普 [lǚ]。'},
                    {term: '盈盈', def: '儀態美好，微笑含情的樣子。'},
                    {term: '度', def: '次、回。'},
                    {term: '驀然', def: '突然、忽然。迴：一作「回」。'},
                    {term: '闌珊', def: '暗淡、零落。'}
                ],
                content: `
                    <p class="font-bold text-2xl mb-2 text-center text-blue-700">【念奴嬌．赤壁懷古】(蘇軾)</p>
                    <div class="poetry-format mb-12">
                        <p>大江東去，浪淘盡，千古風流人物。</p>
                        <p>故壘西邊，人道是，三國周郎赤壁。</p>
                        <p>亂石穿空，驚濤拍岸，捲起千堆雪。</p>
                        <p>江山如畫，一時多少豪傑。</p>
                        <br>
                        <p>遙想公瑾當年，小喬初嫁了，雄姿英發。</p>
                        <p>羽扇綸巾，談笑間，檣櫓灰飛煙滅。</p>
                        <p>故國神遊，多情應笑我，早生華髮。</p>
                        <p>人生如夢，一尊還酹江月。</p>
                    </div>

                    <p class="font-bold text-2xl mb-2 text-center text-blue-700">【聲聲慢．秋情】(李清照)</p>
                    <div class="poetry-format mb-12">
                        <p>尋尋覓覓，冷冷清清，悽悽慘慘戚戚。</p>
                        <p>乍煖還寒時候，最難將息。</p>
                        <p>三杯兩盞淡酒，怎敵他、晚來風急！</p>
                        <p>雁過也，正傷心，卻是舊時相識。</p>
                        <br>
                        <p>滿地黃花堆積，憔悴損，如今有誰堪摘？</p>
                        <p>守著窗兒，獨自怎生得黑！</p>
                        <p>梧桐更兼細雨，到黃昏、點點滴滴。</p>
                        <p>這次第，怎一個愁字了得！</p>
                    </div>

                    <p class="font-bold text-2xl mb-2 text-center text-blue-700">【青玉案．元夕】(辛棄疾)</p>
                    <div class="poetry-format mb-12">
                        <p>東風夜放花千樹。更吹落、星如雨。</p>
                        <p>寶馬雕車香滿路。</p>
                        <p>鳳簫聲動，玉壺光轉，一夜魚龍舞。</p>
                        <br>
                        <p>蛾兒雪柳黃金縷。笑語盈盈暗香去。</p>
                        <p>眾裡尋他千百度。</p>
                        <p>驀然回首，那人卻在，燈火闌珊處。</p>
                    </div>
                `
            }
        ];

        // 獲取 DOM 元素
        const menuList = document.getElementById('menu-list');
        const welcomeScreen = document.getElementById('welcome-screen');
        const articleView = document.getElementById('article-view');
        const articleCategory = document.getElementById('article-category');
        const articleTitle = document.getElementById('article-title');
        const articleAuthor = document.getElementById('article-author');
        const articleIntro = document.getElementById('article-intro');
        const articleContent = document.getElementById('article-content');
        
        // 手機版側邊欄控制
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const openSidebarBtn = document.getElementById('open-sidebar');
        const closeSidebarBtn = document.getElementById('close-sidebar');
        const mobileTitle = document.getElementById('mobile-title');

        // 控制側邊欄開關函數
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            if (sidebar.classList.contains('open')) {
                sidebarOverlay.classList.remove('hidden');
                // 使用 setTimeout 確保 display:block 生效後再執行 opacity 過渡
                setTimeout(() => sidebarOverlay.classList.add('opacity-100'), 10);
            } else {
                sidebarOverlay.classList.remove('opacity-100');
                setTimeout(() => sidebarOverlay.classList.add('hidden'), 300);
            }
        }

        openSidebarBtn.addEventListener('click', toggleSidebar);
        closeSidebarBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // 按類別對數據進行分組
        const categories = {};
        textsData.forEach(text => {
            if (!categories[text.category]) {
                categories[text.category] = [];
            }
            categories[text.category].push(text);
        });

        // 生成側邊欄菜單
        for (const [category, texts] of Object.entries(categories)) {
            // 創建類別標題
            const categoryHeader = document.createElement('div');
            categoryHeader.className = 'text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 mt-4 px-3';
            categoryHeader.textContent = category;
            menuList.appendChild(categoryHeader);

            // 創建該類別下的篇章列表
            texts.forEach(text => {
                const menuItem = document.createElement('button');
                menuItem.className = 'w-full text-left px-3 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-blue-50 hover:text-blue-700 transition-colors mb-1 truncate menu-item';
                menuItem.dataset.id = text.id;
                menuItem.innerHTML = `<i class="fa-solid fa-angle-right mr-2 text-gray-300 text-xs"></i>${text.shortTitle}`;
                
                menuItem.addEventListener('click', () => {
                    // 更新活動狀態樣式
                    document.querySelectorAll('.menu-item').forEach(item => {
                        item.classList.remove('bg-blue-100', 'text-blue-800', 'font-semibold');
                        item.querySelector('i').classList.replace('text-blue-500', 'text-gray-300');
                    });
                    menuItem.classList.add('bg-blue-100', 'text-blue-800', 'font-semibold');
                    menuItem.querySelector('i').classList.replace('text-gray-300', 'text-blue-500');
                    
                    // 加載內容
                    loadContent(text.id);
                    
                    // 手機版點擊後自動關閉側邊欄
                    if (window.innerWidth <= 768) {
                        toggleSidebar();
                    }
                });
                
                menuList.appendChild(menuItem);
            });
        }

        // 加載並顯示文章內容
        function loadContent(id) {
            const data = textsData.find(item => item.id === id);
            if (!data) return;

            // 隱藏歡迎畫面，顯示文章視圖
            welcomeScreen.classList.add('hidden');
            articleView.classList.remove('hidden');

            // 填充數據
            articleCategory.textContent = data.category;
            articleTitle.innerHTML = data.title; // 允許 <br> 換行
            articleAuthor.textContent = data.author;
            articleIntro.textContent = data.intro;
            
            // 設置手機版頂部標題
            mobileTitle.textContent = data.shortTitle;

            // 設置內文，根據類型決定是否居中排版 (詩詞)
            let htmlContent = data.content;
            
            // 自動標記重點字詞與添加底部詞解表
            if (data.annotations && data.annotations.length > 0) {
                // 依詞語長度降序排序，避免短詞取代長詞的一部分 (如先取代「不仁」會影響「不仁者」)
                const sortedAnnos = [...data.annotations].sort((a, b) => b.term.length - a.term.length);
                
                sortedAnnos.forEach(anno => {
                    // 使用正則表達式取代文本，同時避開 HTML 標籤內部的文字
                    const regex = new RegExp(anno.term + '(?![^<]*>)', 'g');
                    htmlContent = htmlContent.replace(regex, `<span class="vocab-highlight text-blue-700 font-bold border-b-2 border-dotted border-blue-400 cursor-pointer hover:bg-blue-50 transition-colors relative" data-def="${anno.def}">$&</span>`);
                });
                
                // 建立底部教育局詞解表 UI
                const vocabHTML = `
                    <div class="mt-16 pt-8 border-t-2 border-gray-100">
                        <h3 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                            <i class="fa-solid fa-book-open-reader mr-3 text-emerald-500"></i>教育局指定詞解
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${data.annotations.map(anno => `
                                <div class="bg-blue-50/50 hover:bg-blue-50 p-4 rounded-xl border border-blue-100 flex items-start transition-colors">
                                    <span class="text-lg font-bold text-blue-700 mr-4 min-w-[3.5rem] text-classical border-r border-blue-200 pr-2">${anno.term}</span>
                                    <span class="text-gray-700 text-base leading-relaxed pt-0.5">${anno.def}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                htmlContent += vocabHTML;
            }

            articleContent.innerHTML = htmlContent;
            
            // 滾動回頂部
            document.getElementById('content-area').scrollTop = 0;
        }

        // --- 以下為詞解 Tooltip 懸浮提示邏輯 ---
        
        // 初始化 Tooltip 元素並加入至 Body
        const tooltip = document.createElement('div');
        tooltip.className = 'fixed z-50 hidden bg-gray-800 text-white text-sm md:text-base rounded-lg py-2.5 px-4 shadow-2xl max-w-[280px] md:max-w-sm pointer-events-none tooltip-anim border border-gray-700 leading-relaxed';
        document.body.appendChild(tooltip);

        // 電腦版：滑鼠移入事件 (事件代理)
        articleContent.addEventListener('mouseover', (e) => {
            const target = e.target.closest('.vocab-highlight');
            if(target) {
                tooltip.innerHTML = `<span class="font-bold text-blue-300 mr-1">${target.textContent}</span>：${target.getAttribute('data-def')}`;
                tooltip.classList.remove('hidden');
                
                const rect = target.getBoundingClientRect();
                // 動態計算位置 (置於單字正上方並水平置中)
                tooltip.style.left = (rect.left + rect.width / 2) + 'px';
                tooltip.style.top = (rect.top - 12) + 'px';
            }
        });

        // 電腦版：滑鼠移出事件
        articleContent.addEventListener('mouseout', (e) => {
            if(e.target.closest('.vocab-highlight')) {
                tooltip.classList.add('hidden');
            }
        });

        // 手機版：點擊觸發提示 (避免需要長按)
        articleContent.addEventListener('click', (e) => {
            const target = e.target.closest('.vocab-highlight');
            if(target && window.innerWidth <= 768) {
                tooltip.innerHTML = `<span class="font-bold text-blue-300 mr-1">${target.textContent}</span>：${target.getAttribute('data-def')}`;
                tooltip.classList.remove('hidden');
                
                const rect = target.getBoundingClientRect();
                tooltip.style.left = (rect.left + rect.width / 2) + 'px';
                tooltip.style.top = (rect.top - 12) + 'px';
                
                // 手機版提示停留 3 秒後自動消失
                setTimeout(() => tooltip.classList.add('hidden'), 3000);
            }
        });

    </script>
</body>
